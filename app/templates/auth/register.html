{% extends "base.html" %}

{% block title %}註冊 - 食譜管家{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-sm-8 col-11">
        <div class="glass-card p-5">
            <h2 class="text-center mb-4 fw-bold">建立新帳號</h2>
            <form action="{{ url_for('auth.register') }}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">使用者名稱</label>
                    <input type="text" class="form-control form-control-lg rounded-pill px-4" id="username" name="username" placeholder="設定唯一的名稱" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">電子信箱</label>
                    <input type="email" class="form-control form-control-lg rounded-pill px-4" id="email" name="email" placeholder="example@email.com" required>
                </div>
                <div class="mb-5">
                    <label for="password" class="form-label">設定密碼</label>
                    <input type="password" class="form-control form-control-lg rounded-pill px-4" id="password" name="password" placeholder="輸入安全的密碼" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg rounded-pill w-100 fw-semibold">完成註冊</button>
                <div class="mt-4 text-center">
                    <small style="opacity: 0.8;">已經有帳號了？ <a href="{{ url_for('auth.login') }}" class="text-info text-decoration-none fw-bold">前往登入</a></small>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
