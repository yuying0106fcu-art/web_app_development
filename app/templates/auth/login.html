{% extends "base.html" %}

{% block title %}登入 - 食譜管家{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-sm-8 col-11">
        <div class="glass-card p-5">
            <h2 class="text-center mb-4 fw-bold">登入帳戶</h2>
            <form action="{{ url_for('auth.login') }}" method="post">
                <div class="mb-4">
                    <label for="username" class="form-label">使用者帳號</label>
                    <input type="text" class="form-control form-control-lg rounded-pill px-4" id="username" name="username" placeholder="輸入帳號" required>
                </div>
                <div class="mb-5">
                    <label for="password" class="form-label">密碼</label>
                    <input type="password" class="form-control form-control-lg rounded-pill px-4" id="password" name="password" placeholder="輸入密碼" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg rounded-pill w-100 fw-semibold">立即登入</button>
                <div class="mt-4 text-center">
                    <small style="opacity: 0.8;">還沒有帳號嗎？ <a href="{{ url_for('auth.register') }}" class="text-info text-decoration-none fw-bold">立即註冊</a></small>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
